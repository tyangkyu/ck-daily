tiers:
  A:
    description: Official and highest credibility sources.
    source_types:
      - corporate_newsroom
      - investor_relations
      - product_release_note
  B:
    description: Credible industry and financial media.
    source_names:
      - TechCrunch
      - Reuters
      - Bloomberg
      - MIT Technology Review
  C:
    description: Weak signal and social/community sources.
    source_names:
      - LinkedIn
      - X
      - Reddit
      - Hacker News

policy:
  tier_c_can_be_critical_alone: false
  default_collection_window_hours: 72
  expanded_collection_window_hours: 96

rss_feeds:
  # Tier A — Official Newsrooms
  - name: OpenAI Newsroom
    url: https://openai.com/news/rss.xml
    tier: A
    companies: [OpenAI]
    scope: [AX, Agentic AI, Enterprise Adoption]

  - name: Anthropic News
    url: https://www.anthropic.com/rss.xml
    tier: A
    companies: [Anthropic]
    scope: [AX, Safety, Enterprise AI]

  - name: Google AI Blog
    url: https://blog.google/technology/ai/rss/
    tier: A
    companies: [Google]
    scope: [AX, Multimodal, Search AI]

  - name: Microsoft AI Blog
